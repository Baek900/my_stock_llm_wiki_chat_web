<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_34 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_34" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_34');
  const devicePixelRatio = window.devicePixelRatio || 1;
  
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Knowledge Graph Simulation Nodes
const nodeCount = 15;
const nodes = [];
const nodeGeometry = new THREE.SphereGeometry(0.1, 16, 16);
const nodeMaterial = new THREE.MeshBasicMaterial({ color: 0x2d5bff });

for (let i = 0; i < nodeCount; i++) {
    const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
    node.position.set(
        (Math.random() - 0.5) * 10,
        (Math.random() - 0.5) * 6,
        (Math.random() - 0.5) * 2
    );
    scene.add(node);
    nodes.push({
        mesh: node,
        originalPos: node.position.clone(),
        velocity: new THREE.Vector3((Math.random() - 0.5) * 0.01, (Math.random() - 0.5) * 0.01, 0),
        isCollecting: false
    });
}

// Particles for "Collecting Nodes" effect
const particleCount = 100;
const particlesGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
    
    colors[i * 3] = 0.45; // 2d5bff primary blue
    colors[i * 3 + 1] = 0.35;
    colors[i * 3 + 2] = 1.0;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.05,
    vertexColors: true,
    transparent: true,
    opacity: 0
});

const particleSystem = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particleSystem);

// Target for Chatbot (Bottom Right)
const chatTarget = new THREE.Vector3(4, -3, 0);

let state = 'idle'; // idle, searching, collecting
let timer = 0;

function animate() {
    requestAnimationFrame(animate);
    timer += 0.01;

    nodes.forEach(node => {
        if (state === 'idle') {
            node.mesh.position.add(node.velocity);
            // Bounce
            if (Math.abs(node.mesh.position.x) > 5) node.velocity.x *= -1;
            if (Math.abs(node.mesh.position.y) > 3) node.velocity.y *= -1;
            node.mesh.scale.setScalar(1 + Math.sin(timer * 2 + node.mesh.position.x) * 0.1);
        } else if (state === 'collecting') {
            // Pull towards chat
            node.mesh.position.lerp(chatTarget, 0.05);
            node.mesh.scale.lerp(new THREE.Vector3(0, 0, 0), 0.05);
        }
    });

    if (state === 'searching') {
        particlesMaterial.opacity = Math.min(particlesMaterial.opacity + 0.02, 0.8);
        const posArray = particlesGeometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
            // Spiral towards target
            const angle = timer * 5 + i * 0.2;
            const radius = 2 * (1 - (i / particleCount));
            posArray[i * 3] = chatTarget.x + Math.cos(angle) * radius;
            posArray[i * 3 + 1] = chatTarget.y + Math.sin(angle) * radius;
            posArray[i * 3 + 2] = (Math.random() - 0.5) * 0.5;
        }
        particlesGeometry.attributes.position.needsUpdate = true;
    } else {
        particlesMaterial.opacity = Math.max(particlesMaterial.opacity - 0.02, 0);
    }

    renderer.render(scene, camera);
}

animate();

// Event Listeners for Demo (Simulated based on scroll or click)
window.addEventListener('click', () => {
    if (state === 'idle') state = 'searching';
    else if (state === 'searching') state = 'collecting';
    else state = 'idle';
});

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_34 -->
</body>
</html>
